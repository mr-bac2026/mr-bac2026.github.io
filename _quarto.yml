# Configuration de base, partagée par les trois langues.
# La liste des pages (render), la navbar et les libellés traduits vivent dans
# les profils : _quarto-fr.yml, _quarto-en.yml, _quarto-ar.yml.
# Construire le site avec ./render.sh (rend chaque profil).
project:
  type: website
  # Sortie « par défaut », c.-à-d. sans --profile : un bac à sable. Les rendus
  # déclenchés par l'IDE (extension Quarto de VS Code) n'indiquent aucun
  # profil ; s'ils écrivaient dans docs/, ils écraseraient les pages du site
  # fusionné par une version sans navbar. Seul render.sh assemble docs/.
  output-dir: _build/scratch
  execute-dir: project
  # Le « / » initial ancre le motif à la racine du projet. Sans lui, Quarto
  # applique le glob à TOUT l'arbre : « index.html » attrapait aussi les pages
  # déjà construites dans _build/<lang>/ et docs/, que chaque profil recopiait
  # alors dans sa propre sortie, d'où une croissance exponentielle du build.
  resources:
    - "/assets/**"
    - "/index.html"
    - "/.nojekyll"

execute:
  freeze: auto
  warning: false
  message: false
  echo: false

website:
  description: "Une lecture statistique des résultats du baccalauréat mauritanien session normale 2026."
  site-url: "https://mr-bac2026.github.io/"
  favicon: assets/logo.svg
  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true

format:
  html:
    include-in-header: assets/cf-analytics.html
    theme:
      - cosmo
      - assets/theme.scss
    toc: true
    toc-depth: 3
    number-sections: false
    fig-align: center
    fig-dpi: 300
    fig-format: png
    code-fold: false
    code-tools: false
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    grid:
      body-width: 900px
      sidebar-width: 240px
      margin-width: 240px
