project:
  type: website
  output-dir: _build/scratch
  execute-dir: project
  resources:
    - "/assets/**"
    - "/index.html"
    - "/.nojekyll"

execute:
  freeze: auto
  warning: false
  message: false
  echo: false

website:
  description: "Une lecture statistique des résultats du baccalauréat mauritanien session normale 2026."
  site-url: "https://mr-bac2026.github.io/"
  favicon: assets/logo.svg
  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true

format:
  html:
    include-in-header: assets/cf-analytics.html
    theme:
      - cosmo
      - assets/theme.scss
    toc: true
    toc-depth: 3
    number-sections: false
    fig-align: center
    fig-dpi: 300
    fig-format: png
    code-fold: false
    code-tools: false
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    grid:
      body-width: 900px
      sidebar-width: 240px
      margin-width: 240px
